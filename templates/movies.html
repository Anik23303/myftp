<html lang="en">

    <title>{{ category_name }} - Movie FTP</title>

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; }
        .header { background: linear-gradient(135deg, #1a1a2e, #16213e); padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #e50914; flex-wrap: wrap; gap: 15px; }
        .header-left { display: flex; align-items: center; gap: 20px; }
        .header-left a { color: #e50914; text-decoration: none; font-size: 1.5rem; font-weight: bold; }

        .category-tabs { display: flex; gap: 10px; flex-wrap: wrap; }

        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }

        .movie-card .title { font-size: 1.2rem; font-weight: bold; margin-bottom: 5px; }
        .movie-card .year { color: #666; font-size: 0.9rem; }
        .movie-card .meta { display: flex; gap: 15px; margin: 10px 0; font-size: 0.85rem; color: #888; flex-wrap: wrap; }
        .movie-card .meta span { background: #2a2a3e; padding: 3px 10px; border-radius: 12px; }
        .movie-card .actions { margin-top: auto; display: flex; gap: 10px; padding-top: 15px; border-top: 1px solid #333; }

        .btn-stream { background: #e50914; color: white; }
        .btn-stream:hover { background: #ff0a1a; }
