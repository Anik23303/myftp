<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Movie FTP</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: #141414; 
            color: #fff; 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .register-container {
            background: #1a1a2e;
            padding: 40px;
            border-radius: 12px;
            border: 1px solid #333;
            max-width: 450px;
            width: 90%;
        }
        .register-container h1 {
            color: #e50914;
            text-align: center;
            margin-bottom: 10px;
        }
        .register-container p {
            color: #888;
            text-align: center;
            margin-bottom: 25px;
            font-size: 0.9rem;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 0.9rem;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            background: #2a2a3e;
            color: white;
            font-size: 1rem;
        }
        .form-group input:focus {
            outline: 2px solid #e50914;
        }
        .form-group input[type="file"] {
            padding: 8px;
            background: #2a2a3e;
        }
        .btn-submit {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            background: #e50914;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-submit:hover {
            background: #ff0a1a;
        }
        .flash {
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
        }
        .flash.success {
            background: #1a3a1a;
            color: #00ff00;
            border: 1px solid #00ff00;
        }
        .flash.error {
            background: #3a1a1a;
            color: #ff4444;
            border: 1px solid #ff4444;
        }
        .links {
            text-align: center;
            margin-top: 20px;
        }
        .links a {
            color: #e50914;
            text-decoration: none;
        }
        .links a:hover {
            text-decoration: underline;
        }
        .info {
            color: #888;
            font-size: 0.8rem;
            text-align: center;
            margin-top: 15px;
        }
        .preview-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #2a2a3e;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            color: #fff;
            margin: 10px auto;
        }
        .preview-avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <h1>📝 Create Account</h1>
        <p>Join our community and start uploading movies</p>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <form method="POST" enctype="multipart/form-data">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required minlength="3" pattern="[A-Za-z0-9]+" title="Alphanumeric only">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required minlength="6">
            </div>
            <div class="form-group">
                <label>Profile Picture (optional)</label>
                <input type="file" name="profile_pic" accept=".jpg,.jpeg,.png,.gif,.webp" onchange="previewImage(this)">
                <div class="preview-avatar" id="avatarPreview">?</div>
            </div>
            <button type="submit" class="btn-submit">Register</button>
        </form>
        
        <div class="links">
            <a href="/login">Already have an account? Login</a><br>
            <a href="/">← Back to home</a>
        </div>
    </div>

    <script>
        function previewImage(input) {
            const preview = document.getElementById('avatarPreview');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.innerHTML = `<img src="${e.target.result}" alt="Preview">`;
                };
                reader.readAsDataURL(input.files[0]);
            } else {
                preview.innerHTML = '?';
            }
        }
    </script>
</body>
</html>
