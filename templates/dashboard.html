<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dashboard - Movie FTP</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; }
        
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            padding: 10px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #141414;
            border-bottom: 1px solid #333;
            flex-wrap: wrap;
            gap: 10px;
        }
        .navbar .brand a {
            color: #e50914;
            text-decoration: none;
            font-size: 1.5rem;
            font-weight: bold;
        }
        .navbar .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .navbar .nav-right a {
            color: #e5e5e5;
            text-decoration: none;
            transition: color 0.3s;
        }
        .navbar .nav-right a:hover { color: #fff; }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 80px 30px 30px;
        }
        
        .dashboard-header {
            display: flex;
            align-items: center;
            gap: 25px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .dashboard-header .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #e50914;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: bold;
            color: white;
        }
        .dashboard-header .avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }
        .dashboard-header .user-details h1 {
            font-size: 1.8rem;
        }
        .dashboard-header .user-details p {
            color: #888;
        }
        .dashboard-header .upload-pic-btn {
            background: #2a2a3e;
            color: #e5e5e5;
            border: 1px solid #333;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.85rem;
        }
        .dashboard-header .upload-pic-btn:hover {
            border-color: #e50914;
            color: #fff;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #1a1a2e;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #333;
            text-align: center;
        }
        .stat-card .number {
            font-size: 2.5rem;
            font-weight: bold;
            color: #e50914;
        }
        .stat-card .label {
            color: #888;
            font-size: 0.9rem;
            margin-top: 5px;
        }
        
        .filter-section {
            background: #1a1a2e;
            padding: 15px 20px;
            border-radius: 10px;
            border: 1px solid #333;
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }
        .filter-section label {
            color: #888;
            font-size: 0.9rem;
        }
        .filter-section input, .filter-section select {
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            background: #2a2a3e;
            color: white;
            font-size: 0.9rem;
        }
        .filter-section input:focus, .filter-section select:focus {
            outline: 2px solid #e50914;
        }
        .filter-section button {
            padding: 8px 20px;
            border: none;
            border-radius: 6px;
            background: #e50914;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
        .filter-section button:hover { background: #ff0a1a; }
        
        .videos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }
        .video-card {
            background: #1a1a2e;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #333;
            transition: transform 0.3s;
        }
        .video-card:hover {
            transform: scale(1.02);
        }
        .video-card .poster {
            height: 150px;
            background: #2a2a3e;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }
        .video-card .info {
            padding: 12px 15px;
        }
        .video-card .info .title {
            font-weight: bold;
            font-size: 1rem;
        }
        .video-card .info .meta {
            color: #888;
            font-size: 0.8rem;
            margin-top: 5px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .video-card .info .meta span {
            background: #2a2a3e;
            padding: 2px 10px;
            border-radius: 4px;
        }
        .video-card .actions {
            padding: 10px 15px 15px;
            display: flex;
            gap: 8px;
        }
        .video-card .actions a {
            flex: 1;
            text-align: center;
            padding: 6px;
            border-radius: 4px;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .btn-stream { background: #e50914; color: white; }
        .btn-stream:hover { background: #ff0a1a; }
        .btn-download { background: #2a2a3e; color: #ddd; }
        .btn-download:hover { background: #3a3a5e; }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        .empty-state .icon { font-size: 4rem; display: block; margin-bottom: 20px; }
        
        .leaderboard-preview {
            background: #1a1a2e;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #333;
            margin-bottom: 20px;
        }
        .leaderboard-preview h3 {
            color: #ffd700;
            margin-bottom: 15px;
        }
        .lb-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 8px 0;
            border-bottom: 1px solid #333;
        }
        .lb-item .rank {
            color: #888;
            width: 30px;
            font-weight: bold;
        }
        .lb-item .lb-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #2a2a3e;
            text-align: center;
            line-height: 30px;
            font-weight: bold;
            color: #fff;
        }
        .lb-item .lb-avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }
        .lb-item .lb-name {
            flex: 1;
        }
        .lb-item .lb-views {
            color: #888;
            font-size: 0.9rem;
        }
        
        @media (max-width: 768px) {
            .container { padding: 70px 15px 20px; }
            .dashboard-header { gap: 15px; }
            .dashboard-header .avatar { width: 60px; height: 60px; font-size: 2rem; }
            .videos-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="brand"><a href="/">🎬 Movie FTP</a></div>
        <div class="nav-right">
            <a href="/">Home</a>
            <a href="/logout">Logout</a>
        </div>
    </nav>

    <div class="container">
        <!-- Dashboard Header -->
        <div class="dashboard-header">
            <div class="avatar">
                {% if profile_pic %}
                    <img src="{{ profile_pic }}" alt="Profile">
                {% else %}
                    {{ username[0].upper() }}
                {% endif %}
            </div>
            <div class="user-details">
                <h1>👤 {{ username }}</h1>
                <p>Your personal dashboard</p>
            </div>
            <form method="POST" action="/api/profile-pic" enctype="multipart/form-data" style="display:inline;">
                <input type="file" name="profile_pic" id="profilePicInput" accept=".jpg,.jpeg,.png,.gif,.webp" style="display:none;" onchange="uploadProfilePic(this)">
                <button type="button" class="upload-pic-btn" onclick="document.getElementById('profilePicInput').click()">📷 Change Photo</button>
            </form>
        </div>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="number" id="totalVideos">0</div>
                <div class="label">Total Videos Uploaded</div>
            </div>
            <div class="stat-card">
                <div class="number" id="totalViews">0</div>
                <div class="label">Total Views</div>
            </div>
        </div>

        <!-- Leaderboard Preview -->
        <div class="leaderboard-preview" id="leaderboardPreview">
            <h3>🏆 Top Creators</h3>
            <div id="leaderboardList">Loading...</div>
        </div>

        <!-- Filter -->
        <div class="filter-section">
            <label>🔍 Filter:</label>
            <input type="text" id="filterSearch" placeholder="Search by title..." onkeyup="applyFilters()">
            <select id="filterCategory" onchange="applyFilters()">
                <option value="">All Categories</option>
                {% for cat in categories %}
                <option value="{{ cat.id }}">{{ cat.name }}</option>
                {% endfor %}
            </select>
            <select id="filterSort" onchange="applyFilters()">
                <option value="views_desc">Most Views</option>
                <option value="views_asc">Least Views</option>
                <option value="date_desc">Newest First</option>
                <option value="date_asc">Oldest First</option>
                <option value="title_asc">A-Z</option>
                <option value="title_desc">Z-A</option>
            </select>
            <button onclick="applyFilters()">Apply</button>
        </div>

        <!-- Videos -->
        <div id="videosContainer">
            <div class="empty-state">
                <span class="icon">🎬</span>
                <h2>Loading your videos...</h2>
            </div>
        </div>
    </div>

    <script>
        let userVideos = [];
        let leaderboardData = [];

        // ===== FETCH USER DATA =====
        function fetchUserData() {
            fetch('/api/user-stats')
                .then(r => r.json())
                .then(data => {
                    document.getElementById('totalVideos').textContent = data.total_videos;
                    document.getElementById('totalViews').textContent = data.total_views;
                    userVideos = data.videos || [];
                    applyFilters();
                })
                .catch(() => {
                    document.getElementById('videosContainer').innerHTML = `
                        <div class="empty-state">
                            <span class="icon">😕</span>
                            <h2>Error loading data</h2>
                            <p>Please refresh the page.</p>
                        </div>
                    `;
                });
        }

        // ===== FETCH LEADERBOARD =====
        function fetchLeaderboard() {
            fetch('/api/leaderboard')
                .then(r => r.json())
                .then(data => {
                    leaderboardData = data.leaderboard || [];
                    renderLeaderboard();
                });
        }

        function renderLeaderboard() {
            const container = document.getElementById('leaderboardList');
            if (leaderboardData.length === 0) {
                container.innerHTML = '<p style="color:#888;">No users yet</p>';
                return;
            }
            let html = '';
            leaderboardData.forEach((user, index) => {
                html += `
                    <div class="lb-item">
                        <span class="rank">#${index + 1}</span>
                        <span class="lb-avatar">${user.username[0].toUpperCase()}</span>
                        <span class="lb-name">${user.username}</span>
                        <span class="lb-views">${user.total_views} views</span>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        // ===== APPLY FILTERS =====
        function applyFilters() {
            const search = document.getElementById('filterSearch').value.toLowerCase();
            const category = document.getElementById('filterCategory').value;
            const sort = document.getElementById('filterSort').value;

            let filtered = [...userVideos];

            // Search filter
            if (search) {
                filtered = filtered.filter(v => v.title.toLowerCase().includes(search));
            }

            // Category filter
            if (category) {
                filtered = filtered.filter(v => v.category === category);
            }

            // Sort
            switch(sort) {
                case 'views_desc': filtered.sort((a, b) => b.views - a.views); break;
                case 'views_asc': filtered.sort((a, b) => a.views - b.views); break;
                case 'date_desc': filtered.sort((a, b) => new Date(b.uploaded_at) - new Date(a.uploaded_at)); break;
                case 'date_asc': filtered.sort((a, b) => new Date(a.uploaded_at) - new Date(b.uploaded_at)); break;
                case 'title_asc': filtered.sort((a, b) => a.title.localeCompare(b.title)); break;
                case 'title_desc': filtered.sort((a, b) => b.title.localeCompare(a.title)); break;
                default: break;
            }

            renderVideos(filtered);
        }

        function renderVideos(videos) {
            const container = document.getElementById('videosContainer');
            if (videos.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <span class="icon">🎬</span>
                        <h2>No videos found</h2>
                        <p>Upload your first movie from the sidebar!</p>
                    </div>
                `;
                return;
            }

            let html = '<div class="videos-grid">';
            videos.forEach(video => {
                html += `
                    <div class="video-card">
                        <div class="poster">🎬</div>
                        <div class="info">
                            <div class="title">${video.title}</div>
                            <div class="meta">
                                <span>📁 ${video.category}</span>
                                <span>👁️ ${video.views} views</span>
                                <span>📅 ${video.uploaded_at ? video.uploaded_at.slice(0,10) : 'N/A'}</span>
                            </div>
                        </div>
                        <div class="actions">
                            <a href="/stream/${video.category}/${video.filename}" class="btn-stream">▶ Stream</a>
                            <a href="/download/${video.category}/${video.filename}" class="btn-download">⬇ Download</a>
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            container.innerHTML = html;
        }

        // ===== UPLOAD PROFILE PICTURE =====
        function uploadProfilePic(input) {
            const file = input.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('profile_pic', file);

            fetch('/api/profile-pic', {
                method: 'POST',
                body: formData
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    location.reload();
                } else {
                    alert(data.error || 'Upload failed');
                }
            })
            .catch(() => alert('Upload failed'));
        }

        // ===== LIVE LEADERBOARD UPDATE =====
        setInterval(fetchLeaderboard, 5000); // Update every 5 seconds

        // ===== INIT =====
        fetchUserData();
        fetchLeaderboard();
    </script>
</body>
</html>
