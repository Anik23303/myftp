<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ movie.title }} - Movie FTP</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: #141414;
            color: #fff;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 12px;
            background: #000;
            margin-bottom: 20px;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        .back-link {
            color: #e50914;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 15px;
        }
        .back-link:hover { text-decoration: underline; }
        .movie-info h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }
        .movie-info .meta {
            color: #888;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .movie-info .meta span {
            background: #2a2a3e;
            padding: 4px 12px;
            border-radius: 4px;
        }
        @media (max-width: 768px) {
            .container { padding: 10px; }
            .movie-info h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/category/{{ movie.category }}" class="back-link">← Back to {{ movie.category }}</a>
        
        <div class="video-wrapper">
            <iframe src="{{ movie.embed_url }}" allowfullscreen></iframe>
        </div>
        
        <div class="movie-info">
            <h1>{{ movie.title }}</h1>
            <div class="meta">
                <span>⭐ {{ movie.rating }}</span>
                <span>📅 {{ movie.year }}</span>
                <span>🌐 {{ movie.language }}</span>
                <span>🎭 {{ movie.genre }}</span>
                <span>👁️ {{ movie.views }} views</span>
            </div>
        </div>
    </div>
</body>
</html>
