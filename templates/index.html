<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 Movie FTP - Browse Movies</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; }
        .header { background: linear-gradient(135deg, #1a1a2e, #16213e); padding: 30px 20px; text-align: center; border-bottom: 3px solid #e50914; }
        .header h1 { font-size: 2.5rem; color: #e50914; letter-spacing: 2px; }
        .header p { color: #888; margin-top: 10px; }
        .search-bar { max-width: 500px; margin: 20px auto 0; display: flex; gap: 10px; }
        .search-bar input { flex: 1; padding: 12px 20px; border: none; border-radius: 30px; background: #2a2a3e; color: white; font-size: 16px; }
        .search-bar input:focus { outline: 2px solid #e50914; }
        .search-bar button { padding: 12px 30px; border: none; border-radius: 30px; background: #e50914; color: white; font-weight: bold; cursor: pointer; font-size: 16px; transition: transform 0.2s; }
        .search-bar button:hover { transform: scale(1.05); }
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        .categories-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 25px; margin-top: 30px; }
        .category-card { background: linear-gradient(135deg, #1a1a2e, #2a2a4e); padding: 30px 20px; border-radius: 15px; text-align: center; cursor: pointer; transition: transform 0.3s, box-shadow 0.3s; text-decoration: none; color: inherit; border: 1px solid #333; }
        .category-card:hover { transform: translateY(-10px) scale(1.02); box-shadow: 0 20px 40px rgba(229, 9, 20, 0.2); border-color: #e50914; }
        .category-card .icon { font-size: 3.5rem; display: block; margin-bottom: 15px; }
        .category-card .name { font-size: 1.2rem; font-weight: bold; }
        .footer { text-align: center; padding: 30px; color: #555; border-top: 1px solid #222; margin-top: 40px; }
        @media (max-width: 768px) {
            .header h1 { font-size: 1.8rem; }
            .categories-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
            .category-card { padding: 20px 15px; }
            .category-card .icon { font-size: 2.5rem; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎬 Movie FTP Server</h1>
        <p>Browse, stream, and download movies directly from our FTP archive</p>
        <form class="search-bar" action="/search" method="GET">
            <input type="text" name="q" placeholder="Search movies..." required>
            <button type="submit">🔍 Search</button>
        </form>
    </div>
    <div class="container">
        <h2>📂 Browse Categories</h2>
        <div class="categories-grid">
            {% for category in categories %}
            <a href="/category/{{ category.id }}" class="category-card">
                <span class="icon">{{ category.icon }}</span>
                <div class="name">{{ category.name }}</div>
            </a>
            {% endfor %}
        </div>
    </div>
    <div class="footer">
        <p>📁 Movie FTP Server | All movies are hosted on our FTP archive</p>
    </div>
</body>
</html>
